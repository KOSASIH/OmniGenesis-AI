global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "omnigenesis-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "omnigenesis-agents"
    static_configs:
      - targets: ["agents:8001"]
    metrics_path: /metrics
